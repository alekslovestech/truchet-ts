<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" color="#cccccccc">
  <!-- Top-left: hourglass -->
  <polygon points="0,0 50,0 25,25" fill="currentColor"/>
  <polygon points="0,50 50,50 25,25" fill="currentColor"/>
  <!-- Top-right: butterfly -->
  <polygon points="75,25 50,0 50,50" fill="currentColor"/>
  <polygon points="75,25 100,0 100,50" fill="currentColor"/>
  <!-- Bottom-left: butterfly -->
  <polygon points="25,75 0,50 0,100" fill="currentColor"/>
  <polygon points="25,75 50,50 50,100" fill="currentColor"/>
  <!-- Bottom-right: hourglass -->
  <polygon points="50,50 100,50 75,75" fill="currentColor"/>
  <polygon points="50,100 100,100 75,75" fill="currentColor"/>
</svg>